<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YANISY</title>
    <style>
        :root {
            --bg-color: #0A0A0A;
            --text-color: #FFFFFF;
            --accent-pink: #FF007F;
            --card-color: #1A1A1A;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
            min-height: 100vh;
        }

        #balance-bar {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        #balance-bar span { color: var(--accent-pink); }

        .section-title {
            padding: 15px 20px 5px;
            font-size: 16px;
            color: #CCC;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            z-index: 100;
        }
        .nav-item {
            background: none;
            border: none;
            color: #666;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 0 10px;
        }
        .nav-item.active { color: var(--accent-pink); font-weight: bold; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        .page { display: none; padding: 0 20px; padding-bottom: 20px; }
        .page.active { display: block; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #AAA; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-color);
            color: #fff;
            font-size: 16px;
        }
        .form-group select { appearance: auto; }

        .task-item {
            background: var(--card-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .task-item .task-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .task-item .task-desc { font-size: 13px; color: #888; margin-bottom: 6px; }
        .task-item button {
            background: var(--accent-pink);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        #admin-panel {
            display: none;
            background: var(--card-color);
            border: 2px solid var(--accent-pink);
            padding: 15px;
            border-radius: 12px;
            margin: 20px;
        }
        #admin-panel h3 { color: var(--accent-pink); margin-bottom: 10px; }
        .admin-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
        .main-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 10px auto;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--accent-pink);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="balance-bar">
        <span>🪙 <span id="user-balance">0</span> Y-Coins</span>
    </div>

    <div id="page-tasks" class="page active">
        <div class="section-title">🔥 Доступные задания:</div>
        <div id="tasks-grid"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="section-title">📊 Твоя статистика</div>
        <div style="background:var(--card-color); border-radius:12px; border:1px solid var(--border-color); padding:15px; margin-bottom:10px;">
            <div style="display:flex; justify-content:space-between;">
                <span>✅ Баланс:</span>
                <span id="stat-balance" style="color:var(--accent-pink);">0</span>
            </div>
        </div>
    </div>

    <div id="page-support" class="page">
        <div class="section-title">🆘 Поддержка</div>
        <button class="main-btn" onclick="window.open('https://t.me/HEDYPA', '_blank')">Написать создателю</button>
    </div>

    <div id="page-withdraw" class="page">
        <div class="section-title">💸 Вывод средств</div>
        <div class="form-group">
            <label>Сумма (Y-Coins)</label>
            <input type="number" id="w-amount" placeholder="Например: 100">
        </div>
        <button class="main-btn" onclick="submitWithdraw()">📤 Подать заявку</button>
    </div>

    <div id="admin-panel">
        <h3>🔐 Админ-панель</h3>
        <div id="admin-list"></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchPage('page-tasks', this)">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h10v2H4v-2z"/></svg>
            Задания
        </button>
        <button class="nav-item" onclick="switchPage('page-stats', this)">
            <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            Статистика
        </button>
        <button class="nav-item" onclick="switchPage('page-support', this)">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            Поддержка
        </button>
        <button class="nav-item" onclick="switchPage('page-withdraw', this)">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            Вывод
        </button>
    </div>

    <script>
        // ===== БАЛАНС =====
        let balance = parseInt(localStorage.getItem('user_balance')) || 0;

        function updateUI() {
            document.getElementById('user-balance').innerText = balance;
            document.getElementById('stat-balance').innerText = balance;
        }
        updateUI();

        // ===== 30 ЗАДАНИЙ (с названиями и описаниями) =====
        function generateTasks() {
            const grid = document.getElementById('tasks-grid');
            grid.innerHTML = '';
            const tasks = [
                { name: "Подпишись на канал @YANISY", desc: "Подпишись и останься на 7 дней", reward: 10 },
                { name: "Скачай игру Wordscapes", desc: "Установи и открой приложение", reward: 25 },
                { name: "Пройди опрос о работе", desc: "Ответь на 10 вопросов", reward: 20 },
                { name: "Подпишись на канал @HEDYPA", desc: "Останься подписанным", reward: 10 },
                { name: "Зарегистрируйся на сайте", desc: "Пройти простую регистрацию", reward: 30 },
                { name: "Скачай приложение", desc: "Открой после установки", reward: 15 },
                { name: "Выполни задание #7", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #8", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #9", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #10", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #11", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #12", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #13", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #14", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #15", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #16", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #17", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #18", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #19", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #20", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #21", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #22", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #23", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #24", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #25", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #26", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #27", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #28", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #29", desc: "Быстрое задание", reward: 5 },
                { name: "Выполни задание #30", desc: "Быстрое задание", reward: 5 }
            ];
            tasks.forEach((t, i) => {
                let reward = t.reward;
                grid.innerHTML += `
                    <div class="task-item">
                        <div>
                            <div class="task-title">${t.name}</div>
                            <div class="task-desc">${t.desc}</div>
                            <div style="font-size:13px; color:var(--accent-pink);">+${reward} Y-Coins</div>
                        </div>
                        <button onclick="openOfferWall()">Выполнить</button>
                    </div>
                `;
            });
        }
        generateTasks();

        // ===== ОТКРЫТИЕ СТЕНЫ ЗАДАНИЙ =====
        function openOfferWall() {
            window.open('https://omg10.com/4/11302575', '_blank');
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ =====
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        // ===== ЗАЯВКА НА ВЫВОД =====
        function submitWithdraw() {
            let amount = parseInt(document.getElementById('w-amount').value);
            if (!amount || amount < 100) return alert('Минимум: 100 Y-Coins');
            if (amount > balance) return alert('Недостаточно Y-Coins');
            alert('✅ Заявка отправлена! Ожидай ответа.');
        }

        // ===== АДМИН-ПАНЕЛЬ =====
        function showAdminPanel() {
            let tgUsername = "";
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                const user = window.Telegram.WebApp.initDataUnsafe.user;
                if (user) {
                    tgUsername = user.username || "";
                }
            }

            if (tgUsername.toLowerCase() === "hedypa") {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('admin-list').innerHTML = '<p style="color:#888; font-size:14px;">Здесь будут появляться заявки на вывод.</p>';
            }
        }
        showAdminPanel();
    </script>
</body>
</html>
